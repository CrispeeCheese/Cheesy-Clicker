<!DOCTYPE html>
<html>
    <head>
        <title>Grilled Cheese Clicker</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: #fff8d0;
                font-family: Arial, sans-serif;
                height: 100vh;
                display: grid;
                grid-template-rows: auto auto 1fr auto;
                grid-template-columns: 1fr 1fr;
                grid-template-areas: 
                    "counter   dropdowns"
                    "sandwich  dropdowns"
                    "sandwich  dropdowns"
                    "msg       reset";
                gap: 10px;
                padding:16px;
            }

            #counter-box {
                grid-area: counter;
                background: #ffd020;
                border: 3px solid #c47a00;
                border-radius: 12px;
                padding: 16px 20px;
            }

            #counter-box h1 {
                color: #c47a00;
                font-size: 24px;
                margin-bottom: 8px;
            }

            #counter-box p {
                font-size: 16px;
                color: #7a5500;
                margin: 4px 0;
            }

            #sandwich-zone {
                grid-area: sandwich;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #sandwich-btn {
                background: none;
                border: none;
                cursor: pointer;
            }
            
            #sandwich-btn:active {
                transform: scale(0.93);
            }

            #sandwich-btn img {
                width: 340px;
                max-width: 100%;
                filter: drop-shadow(0 6px 12px rgba(180,100,0,0.25));
            }

            #dropdowns {
                grid-area: dropdowns;
                display: flex;
                flex-direction: column;
                gap: 10px;
                overflow-y: auto;
            }

            .dropdown-section {
                background: #ffd020;
                border: 3px solid #c47a00;
                border-radius: 12px;
                overflow: hidden;
            }

            .dropdown-headerc{
                background: #c47a00;
                color: #fff8e0;
                font-size: 16px;
                font-weight: bold;
                padding: 10px 16px;
                cursor: pointer;
                display: flex;
                justify-content: space-between;
                align-items: center;
                user-select: none;
            }

            .dropdown-content {
                display: none;
                flex-direction: column;
                padding: 8px;
                gap: 6px;
            }

            .dropdown-content.open {
                display: flex;
            }

            .upgrade-btn {
                font-size: 14px;
                padding: 10px 16px;
                background-color: #ffe680;
                border: 2px solid #c47a00;
                border-radius: 8px;
                cursor: pointer;
                text-align: left;
                transition: background 0.1s;
            }

            .upgrade-btn:hover { background-color: #ffb800; }
            .upgrade-btn:active {transform: scale(0.97); }

            #msg-box {
                grid-area: msg;
                background: #fff3b0;
                border: 2px solid #e0c030;
                border-radius: 10px;
                padding: 12px 16px;
                font-size: 15px;
                color: #7a5500;
                display: flex;
                align-items: center;
            }

            #reset-box {
                grid-area: reset;
                display: flex;
                flex-direction: column;
                gap: 6px;
                justify-content: flex-end;
            }

            #reset-box button {
                font-size: 14px;
                padding: 10px 16px;
                border-radius: 8px;
                border: 2px solid #c47a00;
                cursor: pointer;
                font-weight: bold;
            }

            #achievements-section {
                grid-column: 1 / -1;
                background: #fff3b0;
                border: 2px solid #e0c030;
                border-radius: 12px;
                padding: 12px;
            }

            #achievements-section h2 {
                color: #c47a00;
                margin-bottom: 8px;
            }

            #achievements-list {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            #achievement-popup {
                display: none;
                position: fixed;
                top: 20px;
                right: 20px;
                background: #ffd020;
                border: 3px solid #c47a00;
                border-radius: 12px;
                padding: 15px 20px;
                font-size: 18px;
                font-weight: bold;
                color: #5a3800;
                z-index: 999;
            }


        </style>
    </head>
    <body>

        <h1>Grilled Cheese Clicker</h1>
        <p>Grilled Cheeses: <span id="count">0</span></p>
        <p>Per click: <span id="perclick">1</span></p>
        <p>Per second: <span id="persecond">0</span></p>
        <button onclick="addCheese()" style="background:none; border:none; cursor:pointer;">
            <img src="Grilled Cheese for Code.png" alt="Grilled Cheese" width="300">
        </button>

        <hr>
        <h2 style="color: #c47a00;">Upgrades</h2>
        <button class="upgrade-btn" onclick="buyButter()">
            Buy Butter - 10 Grilled Cheese (+1 per click)
        </button>
        <button class="upgrade-btn" onclick="buyPan()">
            Frying Pan - 75 Grilled Cheese (+5 per click)
        </button>
        <button class="upgrade-btn" onclick="buyToaster()">
            Buy Toaster - 35 Grilled Cheese (+1 per Second)
        </button>
         <button class="upgrade-btn" onclick="buyGrilledCheeseStand()">
            Grilled Cheese Stand - 200 Grilled Cheese (+5 per second)
        </button>
        <button class="upgrade-btn" onclick="buyStoreFront()">
            Store Front - 750 Grilled Cheese (+15 per second)
        </button>
        <p id="upgrade-msg"></p>
        <button class="upgrade-btn" onclick="saveGame()">
            Save Game
        </button>
        <button class="upgrade-btn" onclick="resetGame()" style="background-color: #ffaaaa;">
            RESET GAME
        </button>
        <button class="upgrade-btn" onclick="rebirth()" style="background-color: #ffd700;">
            REBIRTH
        </button>
        <p>Rebirths: <span id="rebirth-count">0</span> | Multiplier: <span id="rebirth-multiplier">1.00</span>x</p>
       

        <hr>
        <h2 style="color: #c47a00;">Cheese Wheels</h2>
        <div id="achievement-popup" style="
        display: none;
        position: fixed;
        top: 20px;
        right: 20px;
        background: #ffd020;
        border: 3px solid #c47a00;
        border-radius: 12px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        color: #5a3800;
        z-index: 999;
        "></div>
        <div id="achievements-list" style="
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
        "></div>


        <script>
            let grilledCheeses = 0;
            let perClick = 1;
            let perSecond = 0;
            let rebirths = 0;
            let rebirthMultiplier = 1;
            let totalClicks = 0;

            let achievements = [
                { id: "click10", name: "Humble Grilling", desc: "Click 10 Times", unlocked: false},
                { id: "click100", name: "Grilling Harder", desc: "Click 100 Times", unlocked: false},
                { id: "cheese100", name: "Decent Griller", desc: "Reach 100 Grilled Cheese", unlocked: false},
                { id: "cheese1k", name: "Cheese Enjoyer", desc: "Reach 1,000 Grilled Cheese", unlocked: false},
                { id: "cheese10k", name: "Cheese Enthusiast", desc: "Reach 10,000 Grilled Cheese", unlocked: false},
                { id: "rebirth1", name: "The Cheese Is A Lie", desc: "Rebirth Once", unlocked: false},
                { id: "rebirth5", name: "You Need More Cheese", desc: "Rebirth 5 Times", unlocked: false},
                { id: "allUpgrades", name: "There Is Yet More", desc: "Buy Every Upgrade", unlocked: false},
            ];

            function checkAchievements() {
                if (totalClicks >= 10) unlockAchievement("click10");
                if (totalClicks >= 100) unlockAchievement("click100");
                if (grilledCheeses >=100) unlockAchievement("cheese100");
                if (grilledCheeses >= 1000) unlockAchievement("cheese1k");
                if (grilledCheeses >= 10000) unlockAchievement("cheese10k");
                if (rebirths >= 1) unlockAchievement("rebirth1");
                if (rebirths >= 5) unlockAchievement("rebirth5");  
                if (perClick >= 6 && perSecond >= 21) unlockAchievement("allUpgrades");         
            }

            function unlockAchievement(id) {
                let ach = achievements.find(a => a.id ===id);
                if (ach && !ach.unlocked) {
                ach.unlocked = true;
                showAchievementPopup(ach);
                renderAchievements();
                saveGame();
                }
            }

            function showAchievementPopup(ach) {
                let popup = document.getElementById("achievement-popup");
                popup.innerHTML = " Achievement Unlocked!<br>" + ach.name;
                popup.style.display = "block";
                setTimeout(function() {
                    popup.style.display = "none";
                }, 3000);
            }

            function renderAchievements() {
                let list = document.getElementById("achievements-list");
                list.innerHTML = " ";
                achievements.forEach(function(ach) {
                    let card = document.createElement("div");
                    card.style.cssText = "background:" + (ach.unlocked ? "#ffd020" : "#ddd") + ";border:2px solid " + (ach.unlocked ? "#c47a00" : "#aaa") + ";border-radius:10px;padding:10px 15px;font-size:14px;width:150px;text-align:center;";
                    card.innerHTML = "<b>" + ach.name + "</b><br><span style='font-size:12px;color:#7a5500'>" + ach.desc + "</span>";
                    list.appendChild(card);
                });
            }

            function addCheese() {
                grilledCheeses = grilledCheeses + perClick;
                totalClicks = totalClicks + 1;
                document.getElementById("count").innerHTML = Math.floor(grilledCheeses);
                document.getElementById("perclick").innerHTML = Math.floor(perClick);
                checkAchievements();
            }

            function buyButter() {
                if (grilledCheeses >= 10) {
                grilledCheeses = grilledCheeses - 10
                perClick = perClick + 1
                document.getElementById("count").innerHTML = grilledCheeses;
                document.getElementById("perclick").innerHTML = perClick;
                document.getElementById("upgrade-msg").innerHTML = "Upgrade Purchased";
                checkAchievements();
                } else {
                    document.getElementById("upgrade-msg").innerHTML = "Need More Cheese";
            }
         }

         function buyToaster() {
            if (grilledCheeses>=35) {
             grilledCheeses = grilledCheeses -35;
             perSecond = perSecond + 1;
             document.getElementById("count").innerHTML = grilledCheeses;
             document.getElementById("persecond").innerHTML = perSecond;
             document.getElementById("upgrade-msg").innerHTML = "Upgrade Purchased";
             checkAchievements();
            } else{
                    document.getElementById("upgrade-msg").innerHTML = "Need More Cheese";
         }
        }

        function buyPan() {
  if (grilledCheeses >= 75) {
    grilledCheeses = grilledCheeses - 75;
    perClick = perClick + 5;
    document.getElementById("count").innerHTML = grilledCheeses;
    document.getElementById("perclick").innerHTML = perClick;
    document.getElementById("upgrade-msg").innerHTML = "Upgrade Purchased";
    checkAchievements();
  } else {
    document.getElementById("upgrade-msg").innerHTML = "Need More Cheese";
  }
}

function buyGrilledCheeseStand() {
    if (grilledCheeses >= 200) {
        grilledCheeses = grilledCheeses - 200;
        perSecond = perSecond + 5;
        document.getElementById("count").innerHTML = grilledCheeses;
        document.getElementById("persecond").innerHTML = perSecond;
        document.getElementById("upgrade-msg").innerHTML = "Upgrade Purchased";
        checkAchievements();
    } else {
        document.getElementById("upgrade-msg").innerHTML = "Need More Cheese";
    }
}

function buyStoreFront() {
    if (grilledCheeses >= 750) {
        grilledCheeses = grilledCheeses - 750
        perSecond = perSecond + 15
        document.getElementById("count").innerHTML = grilledCheeses;
        document.getElementById("persecond").innerHTML = perSecond;
        document.getElementById("upgrade-msg").innerHTML = "Upgrade Purchased";
        checkAchievements();
    } else {
        document.getElementById("upgrade-msg").innerHTML = "Need More Cheese";
    }
}      
        function saveGame() {
            localStorage.setItem("cheeses", grilledCheeses);
            localStorage.setItem("perClick", perClick);
            localStorage.setItem("perSecond", perSecond);
            localStorage.setItem("rebirths", rebirths);
            localStorage.setItem("rebirthMultiplier", rebirthMultiplier);
            localStorage.setItem("achievements", JSON.stringify(achievements));
        }

        function loadGame() {
            if (localStorage.getItem("cheeses")) {
             grilledCheeses = Number(localStorage.getItem("cheeses"));
             perClick = Number(localStorage.getItem("perClick"));
             perSecond = Number(localStorage.getItem("perSecond"));
             document.getElementById("count").innerHTML = grilledCheeses;
             document.getElementById("perclick").innerHTML = Math.floor(perClick);
             document.getElementById("persecond").innerHTML = perSecond;
             document.getElementById("rebirth-count").innerHTML = rebirths;
             document.getElementById("rebirth-multiplier").innerHTML = rebirthMultiplier.toFixed(2);
             let savedAch = localStorage.getItem("achievements");
             if (savedAch) {
                let parsed = JSON.parse(savedAch);
                parsed.forEach(function(saved) {
                    let ach = achievements.find(a => a.id === saved.id);
                    if (ach) ach.unlocked = saved.unlocked;
                });
             }
             renderAchievements();
        }
        }

        function resetGame() {
            if(confirm("Are you sure? This will DELETE all progress...")) {
                localStorage.clear();
                grilledCheeses = 0;
                perClick = 1;
                perSecond = 0;
                rebirths = 0;
                rebirthMultiplier = 1;
                document.getElementById("count").innerHTML = 0;
                document.getElementById("perclick").innerHTML = 1;
                document.getElementById("persecond").innerHTML = 0;
                document.getElementById("rebirth-count").innerHTML = 0;
                document.getElementById("rebirth-multiplier").innerHTML = "1.00";
                document.getElementById("upgrade-msg").innerHTML = "Reset Completed...";
            }
        }

        function rebirth() {
            let rebirthCost = 1000 * Math.pow(5, rebirths);
            if (grilledCheeses >= rebirthCost) {
                if (confirm("Are You Ready To Ascend? (all is givin up for a 1.25x grilling power)?")) {
                    rebirths = rebirths + 1;
                    rebirthMultiplier = rebirthMultiplier * 1.25;
                    grilledCheeses = 0;
                    perClick = Math.round(rebirthMultiplier);
                    perSecond = 0;
                    document.getElementById("count").innerHTML = 0;
                    document.getElementById("perclick").innerHTML = perClick.toFixed(2);
                    document.getElementById("persecond").innerHTML = 0;
                    document.getElementById("rebirth-count").innerHTML = rebirths;
                    document.getElementById("rebirth-multiplier").innerHTML = rebirthMultiplier.toFixed(2);
                    document.getElementById("upgrade-msg").innerHTML = "The Cheese Calls To The Heavens... You Answered...";
                    saveGame();
                    checkAchievements();
                }
            } else {
                document.getElementById("upgrade-msg").innerHTML = "You Are NOT Ready... (Need " + rebirthCost + " Grilled Cheeses)";
            }
        }

        loadGame();

         setInterval(function() {
            grilledCheeses = grilledCheeses + perSecond;
            document.getElementById("count").innerHTML = Math.floor(grilledCheeses);
         }, 1000);

         setInterval(function() {
            saveGame();
         }, 5000);
        </script>
    </body>
</html>
