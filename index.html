<!DOCTYPE html>
<html>
    <head>
        <title>Grilled Cheese Clicker</title>
        <style>
            body {
                background-color: #fff8d0
                font-family: Arial, sans-serif;
                text-align: center;
                padding: 40px;
            }

            h1 {
                color: #c47a00;
                font-size: 36px;
            }
            p {
                font-size: 24px;
                color: #7a5500
            }
            button {
                font-size:24px;
                padding:20px 40px;
                background-color: #ffd020;
                border: 3px solid #c47a00
                border-radius: 12px;
                cursor: pointer;
                margin-top: 20px;
            }
            button:hover {background-color: #ffb800;}
            button:active {transform: scale(0.93);}

            .upgrade-btn {
                font-size: 16px;
                padding: 12px 24px;
                background-color: #ffe680;
                display: block;
                margin: 10px auto;
            }
        </style>
    </head>
    <body>

        <h1>Grilled Cheese Clicker</h1>
        <p>Grilled Cheeses: <span id="count">0</span></p>
        <p>Per click: <span id="perclick">1</span></p>
        <p>Per second: <span id="persecond">0</span></p>
        <button onclick="addCheese()">Click The Cheese...</button>

        <hr>
        <h2 style="color: #c47a00;">Upgrades</h2>
        <button class="upgrade-btn" onclick="buyButter()">
            Buy Butter - 10 Grilled Cheese (+1 per click)
        </button>
        <button class="upgrade-btn" onclick="buyPan()">
            Frying Pan - 75 Grilled Cheese (+5 per click)
        </button>
        <button class="upgrade-btn" onclick="buyToaster()">
            Buy Toaster - 35 Grilled Cheese (+1 per Second)
        </button>
        <p id="upgrade-msg"></p>
        <button class="upgrade-btn" onclick="saveGame()">
            Save Game
        </button>
        <button class="upgrade-btn" onclick="resetGame()" style="background-color: #ffaaaa;">
            RESET GAME
        </button>
        <button class="upgrade-btn" onclick="rebirth()" style="background-color: #ffd700;">
            REBIRTH
        </button>
        <p>Rebirths: <span id="rebirth-count">0</span> | Multiplier: <span id="rebirth-multiplier">1.00</span>x</p>

        <script>
            let grilledCheeses = 0;
            let perClick = 1;
            let perSecond = 0;
            let rebirths = 0;
            let rebirthMultiplier = 1

            function addCheese() {
                grilledCheeses = grilledCheeses + perClick;
                document.getElementById("count").innerHTML = grilledCheeses;
            }

            function buyButter() {
                if (grilledCheeses >= 10) {
                grilledCheeses = grilledCheeses - 10
                perClick = perClick + 1
                document.getElementById("count").innerHTML = grilledCheeses
                document.getElementById("perclick").innerHTML = perClick
                document.getElementById("upgrade-msg").innerHTML = "Upgrade Purchased"
                } else {
                    document.getElementById("upgrade-msg").innerHTML = "Need More Cheese"
            }
         }

         function buyToaster() {
            if (grilledCheeses>=35) {
             grilledCheeses = grilledCheeses -35;
             perSecond = perSecond + 1;
             document.getElementById("count").innerHTML = grilledCheeses;
             document.getElementById("persecond").innerHTML = perSecond;
             document.getElementById("upgrade-msg").innerHTML = "Upgrade Purchased";
            } else{
                    document.getElementById("upgrade-msg").innerHTML = "Need More Cheese";
         }
        }

        function buyPan() {
  if (grilledCheeses >= 75) {
    grilledCheeses = grilledCheeses - 75;
    perClick = perClick + 5;
    document.getElementById("count").innerHTML = grilledCheeses;
    document.getElementById("perclick").innerHTML = perClick;
    document.getElementById("upgrade-msg").innerHTML = "Upgrade Purchased";
  } else {
    document.getElementById("upgrade-msg").innerHTML = "Need More Cheese";
  }
}
        
        function saveGame() {
            localStorage.setItem("cheeses", grilledCheeses);
            localStorage.setItem("perClick", perClick);
            localStorage.setItem("perSecond", perSecond);
            localStorage.setItem("rebirths", rebirths);
            localStorage.setItem("rebirthMultiplier", rebirthMultiplier);
        }

        function loadGame() {
            if (localStorage.getItem("cheeses")) {
             grilledCheeses = Number(localStorage.getItem("cheeses"));
             perClick = Number(localStorage.getItem("perClick"));
             perSecond = Number(localStorage.getItem("perSecond"));
             document.getElementById("count").innerHTML = grilledCheeses;
             document.getElementById("perclick").innerHTML = perClick;
             document.getElementById("persecond").innerHTML = perSecond;
             document.getElementById("rebirth-count").innerHTML = rebirths;
             document.getElementById("rebirth-multiplier").innerHTML = rebirthMultiplier.toFixed(2);
        }
        }

        function resetGame() {
            if(confirm("Are you sure? This will DELETE all progress...")) {
                localStorage.clear();
                grilledCheeses = 0;
                perClick = 1;
                perSecond = 0;
                document.getElementById("count").innerHTML = 0;
                document.getElementById("perclick").innerHTML = 1;
                document.getElementById("persecond").innerHTML = 0;
                document.getElementById("upgrade-msg").innerHTML = "Reset Completed..."
            }
        }

        function rebirth() {
            let rebirthCost = 1000 * Math.pow(5, rebirths);
            if (grilledCheeses >= rebirthCost) {
                if (confirm("Are You Ready To Ascend? (all is givin up for a 1.25x grilling power)?")) {
                    rebirths = rebirths + 1;
                    rebirthMultiplier = rebirthMultiplier * 1.25;
                    grilledCheeses = 0;
                    perClick = 1 * rebirthMultiplier;
                    perSecond = 0;
                    document.getElementById("count").innerHTML = 0;
                    document.getElementById("perclick").innerHTML = perClick.toFixed(2);
                    document.getElementById("persecond").innerHTML = 0;
                    document.getElementById("rebirth-count").innerHTML = rebirths;
                    document.getElementById("rebirth-multiplier").innerHTML = rebirthMultiplier.toFixed(2);
                    document.getElementById("upgrade-msg").innerHTML = "The Cheese Calls To The Heavens... You Answered...";
                    saveGame();
                }
            } else {
                document.getElementById("upgrade-msg").innerHTML = "You Are NOT Ready... (Need" + rebirthCost + "Grilled Cheeses)";
            }
        }

        loadGame();

         setInterval(function() {
            grilledCheeses = grilledCheeses + perSecond;
            document.getElementById("count").innerHTML = Math.floor(grilledCheeses);
         }, 1000);

         setInterval(function() {
            saveGame();
         }, 5000);
        </script>
    </body>
</html>
