<!DOCTYPE html>
<html>
    <head>
        <title>Grilled Cheese Clicker</title>
        <style>
            body {
                background-color: #fff8d0
                font-family: Comic-sans;
                text-align: center;
                padding: 40px;
            }

            h1 {
                color: #c47a00;
                font-size: 36px;
            }
            p {
                font-size: 24px;
                color: #7a5500
            }
            button {
                font-size:24px;
                padding:20px 40px;
                background-color: #ffd020;
                border: 3px solid #c47a00
                border-radius: 12px;
                cursor: pointer;
                margin-top: 20px;
            }
            button:hover {
                background-color: #ffb800;
            }
            button:active {
                transform: scale(0.93);
            }
        </style>
    </head>
    <body>

        <h1>Grilled Cheese Clicker</h1>
        <p>Grilled Cheeses: <span id="count">0</span></p>
        <button onclick="addCheese()">Click The Cheese...</button>

        <script>
            let grilledCheeses = 0

            function addCheese() {
                grilledCheeses = grilledCheeses + 1;
                document.getElementById("count").innerHTML = grilledCheeses
            }
        </script>
    </body>
</html>
